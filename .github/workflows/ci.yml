name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq ripgrep

      - name: Check shell syntax
        run: |
          bash -n check-api-quality-and-model-integrity.sh
          bash -n compare-app-vs-cli-gpt55.sh
          bash -n scripts/probe-gpt55-authenticity.sh
          bash -n scripts/secret-scan.sh
          bash -n tests/run_mock_e2e.sh
          bash -n tests/run_mock_failure_e2e.sh
          python3 -m py_compile tests/mock_responses_api.py

      - name: Run secret scan
        run: bash scripts/secret-scan.sh

      - name: Validate example reports
        run: jq empty examples/reports/*.json

      - name: Run mock E2E audit
        run: bash tests/run_mock_e2e.sh

      - name: Run mock failure E2E audit
        run: bash tests/run_mock_failure_e2e.sh

      - name: Check PowerShell wrappers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = @(
            "check-api-quality-and-model-integrity.ps1",
            "compare-app-vs-cli-gpt55.ps1",
            "scripts/probe-gpt55-authenticity.ps1",
            "scripts/secret-scan.ps1"
          )
          foreach ($file in $files) {
            $tokens = $null
            $parseErrors = $null
            $null = [System.Management.Automation.Language.Parser]::ParseFile($file, [ref]$tokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) {
              $parseErrors | ForEach-Object { Write-Error "${file}: $($_.Message)" }
              throw "PowerShell parse failed: $file"
            }
          }
